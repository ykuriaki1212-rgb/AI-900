<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#e2e8f0}
.unlock-card{background:#1e293b;border-radius:16px;padding:48px;max-width:420px;width:90%;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.unlock-card h1{font-size:1.5rem;margin-bottom:8px;color:#f1f5f9}
.unlock-card p{color:#94a3b8;margin-bottom:24px;font-size:.9rem}
.unlock-card input{width:100%;padding:12px 16px;border:2px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;font-size:1rem;outline:none;transition:border .2s}
.unlock-card input:focus{border-color:#6366f1}
.unlock-card button{margin-top:16px;width:100%;padding:12px;border:none;border-radius:8px;background:#6366f1;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
.unlock-card button:hover{background:#4f46e5}
.error-msg{color:#f87171;margin-top:12px;font-size:.85rem;display:none}
</style>

async function unlock(){
  const pw=document.getElementById("pw").value;
  const err=document.getElementById("err");
  err.style.display="none";
  try{
    const enc=new TextEncoder();
    const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    const salt=Uint8Array.from(atob(S),c=>c.charCodeAt(0));
    const iv=Uint8Array.from(atob(N),c=>c.charCodeAt(0));
    const ct=Uint8Array.from(atob(T),c=>c.charCodeAt(0));
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]);
    const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    err.style.display="block";
  }
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
