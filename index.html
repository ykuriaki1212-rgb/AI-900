<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:linear-gradient(160deg,#0c1d3a 0%,#0e3a6e 25%,#1565a8 50%,#1e88c7 75%,#2fa0d8 100%);background-attachment:fixed;min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-box{background:linear-gradient(145deg,rgba(15,50,100,0.95),rgba(10,35,70,0.98));border:1px solid rgba(56,189,248,0.3);border-radius:20px;padding:48px 40px;max-width:440px;width:90%;box-shadow:0 8px 40px rgba(0,100,200,0.3);text-align:center;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.auth-box h2{font-size:1.5rem;font-weight:700;color:#e8f4ff;margin-bottom:8px}
.auth-box p{color:#93c5e8;margin-bottom:24px;font-size:.95rem}
.auth-box input{width:100%;padding:14px 18px;border:2px solid rgba(56,189,248,0.3);background:rgba(0,30,70,0.5);color:#e8f4ff;border-radius:10px;font-size:1rem;outline:none;transition:border-color .2s}
.auth-box input::placeholder{color:rgba(147,197,232,0.5)}
.auth-box input:focus{border-color:#38bdf8}
.error-msg{color:#fb7185;font-size:.85rem;margin-top:8px;min-height:1.2em}
.auth-box button{margin-top:20px;width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#0284c7 0%,#06b6d4 50%,#2dd4bf 100%);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s}
.auth-box button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,120,212,0.35)}
.loading{display:none;color:#93c5e8;margin-top:16px;font-size:.9rem}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(147,197,232,0.3);border-top-color:#38bdf8;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.expired-msg{color:#fb7185;font-size:1.2rem;font-weight:600}
</style>
